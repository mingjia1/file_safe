version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ptm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ptm}
      MYSQL_USER: ${MYSQL_USER:-ptmuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ptmpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptm-backend
    restart: unless-stopped
    environment:
      DATABASE_TYPE: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-ptmuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ptmpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ptm}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEBUG: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ptm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  mysql_data:
